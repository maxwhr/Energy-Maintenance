name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: energy_test
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: energy_maintenance_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U energy_test -d energy_maintenance_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://energy_test@127.0.0.1:5432/energy_maintenance_ci
      APP_ENV: test
      EXTERNAL_REAL_CALLS_ENABLED: "false"
      ENABLE_RETRIEVAL_LAB: "false"
      CLOUD_LLM_ENABLED: "false"
      CLOUD_VISION_ENABLED: "false"
      OCR_API_ENABLED: "false"
      OCR_ENABLED: "false"
      EMBEDDING_ENABLED: "false"
      EMBEDDING_REAL_CALL_ENABLED: "false"
      DASHVECTOR_ENABLED: "false"
      DASHVECTOR_REAL_CALL_ENABLED: "false"
      VECTOR_SEARCH_ENABLED: "false"
      RERANK_ENABLED: "false"
      MIMO_ENABLED: "false"
      MINIMAX_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -e ".[dev]"
      - name: Compile backend
        working-directory: backend
        run: python -m compileall -q app
      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Type-check frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject local credentials and database artifacts
        shell: bash
        run: |
          set -euo pipefail
          forbidden="$(
            git ls-files |
              grep -E '(^|/)(\.private/|\.runtime/|pgdata/|postgres-data/)|(^|/)\.env($|\.)|\.(sql|dump|backup|sqlite|sqlite3|db)$' |
              grep -Ev '(^|/)\.env\.example$|(^|/)[^/]*\.env\.example$|\.template$' || true
          )"
          if [[ -n "$forbidden" ]]; then
            echo "Forbidden local or database artifacts are tracked:"
            echo "$forbidden"
            exit 1
          fi
      - name: Reject recognizable committed secrets
        shell: bash
        run: |
          set -euo pipefail
          if git grep -lE \
            '(AKIA[0-9A-Z]{16}|sk-[A-Za-z0-9_-]{24,}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----)' \
            -- . ':!*.example' ':!*.template' ':!frontend/package-lock.json'; then
            echo "Recognizable API key or private key material detected in the listed files."
            exit 1
          fi
